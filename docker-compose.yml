services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: silent-wake-app
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3000}
      DATABASE_URL: ${DATABASE_URL:-postgres://silentwake:silentwake@postgres:5432/silentwake}
      HTTP_RATE_LIMIT_MAX: ${HTTP_RATE_LIMIT_MAX:-180}
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres:
    image: postgres:16-bookworm
    container_name: silent-wake-postgres
    environment:
      POSTGRES_DB: silentwake
      POSTGRES_USER: silentwake
      POSTGRES_PASSWORD: silentwake
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U silentwake -d silentwake"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
